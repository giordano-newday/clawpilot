name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  checks:
    name: Checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright
        run: cd packages/clawpilot-browser && pnpm exec playwright install chromium

      - name: Run lint
        run: pnpm exec eslint .

      - name: Run format check
        run: pnpm exec prettier --check .

      - name: Run typecheck
        run: pnpm -r lint

      - name: Run tests
        run: pnpm test

      - name: Run build
        run: pnpm build
